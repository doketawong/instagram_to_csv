services:
  db:
    image: postgres:16-alpine
    profiles: ["embedded"]
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    env_file: .env
    volumes:
      # Provide .env at runtime so `dotenv.config()` can load it.
      - ./.env:/app/.env:ro
    command: ["node", "index.js"]

volumes:
  pgdata:
